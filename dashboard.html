<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bot Sphinx — Suivi d'avancement</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #0d1117; color: #e6edf3; margin: 0; padding: 32px;
    display: flex; justify-content: center;
  }
  .wrap { width: 100%; max-width: 720px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #8b949e; font-size: 13px; margin-bottom: 24px; word-break: break-all; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; margin-bottom: 16px; }

  /* Panneau de contrôle */
  .controls { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .ctrl-group { display: flex; flex-direction: column; gap: 6px; }
  .ctrl-group label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; }
  .counter { display: flex; align-items: center; gap: 8px; }
  .counter button {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid #30363d;
    background: #21262d; color: #e6edf3; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .counter button:hover { background: #30363d; }
  .counter input {
    width: 70px; text-align: center; background: #21262d; border: 1px solid #30363d;
    border-radius: 8px; color: #e6edf3; font-size: 16px; font-weight: 700;
    padding: 4px 8px; height: 32px;
  }
  .counter input::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* Toggle visible/headless */
  .toggle-wrap { display: flex; align-items: center; gap: 10px; }
  .toggle { position: relative; width: 48px; height: 26px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; background: #21262d; border-radius: 999px;
    cursor: pointer; transition: background .2s; border: 1px solid #30363d;
  }
  .slider:before {
    content: ""; position: absolute; left: 3px; top: 3px;
    width: 18px; height: 18px; background: #8b949e; border-radius: 50%; transition: .2s;
  }
  .toggle input:checked + .slider { background: #1f6feb; border-color: #1f6feb; }
  .toggle input:checked + .slider:before { transform: translateX(22px); background: #fff; }
  .toggle-label { font-size: 13px; color: #e6edf3; min-width: 90px; }

  /* Boutons lancer / arrêter */
  .actions { margin-left: auto; display: flex; gap: 10px; }
  .btn-launch {
    padding: 0 24px; height: 40px; border-radius: 8px;
    border: none; background: #238636; color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background .15s; white-space: nowrap;
  }
  .btn-launch:hover:not(:disabled) { background: #2ea043; }
  .btn-launch:disabled { background: #21262d; color: #6e7681; cursor: not-allowed; }
  .btn-stop {
    padding: 0 24px; height: 40px; border-radius: 8px;
    border: 1px solid #f85149; background: transparent; color: #f85149;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: .15s; white-space: nowrap;
  }
  .btn-stop:hover:not(:disabled) { background: #f8514922; }
  .btn-stop:disabled { border-color: #30363d; color: #6e7681; cursor: not-allowed; }

  /* Vitesse */
  .speed-row { display: flex; align-items: center; gap: 12px; }
  .speed-row input[type=range] { width: 180px; accent-color: #1f6feb; }
  .speed-val { font-size: 14px; font-weight: 700; min-width: 46px; }
  .speed-val.turbo { color: #d29922; }
  .speed-val.danger { color: #f85149; }

  /* Avertissement santé Sphinx */
  .warn {
    display: none; margin-top: 14px; padding: 10px 14px; border-radius: 8px;
    font-size: 13px; line-height: 1.5;
    background: #d2992222; border: 1px solid #d29922; color: #f0c674;
  }
  .warn.danger { background: #f8514922; border-color: #f85149; color: #ff9a93; }
  .warn.show { display: block; }

  /* Barre de progression */
  .barwrap { background: #21262d; border-radius: 8px; height: 28px; overflow: hidden; position: relative; }
  .bar { background: linear-gradient(90deg,#238636,#2ea043); height: 100%; width: 0%; transition: width .4s ease; }
  .bar.done { background: linear-gradient(90deg,#1f6feb,#388bfd); }
  .barlabel { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 20px; }
  .stat { text-align: center; }
  .stat .n { font-size: 26px; font-weight: 700; }
  .stat .l { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; }
  .ok .n { color: #3fb950; }
  .err .n { color: #f85149; }

  /* Log */
  .log { font-family: "SF Mono", Consolas, monospace; font-size: 12px; line-height: 1.7; }
  .log div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log .OK { color: #3fb950; }
  .log .TIMEOUT, .log .ERREUR { color: #f85149; }
  /* Données figées d'un run terminé/arrêté : on grise tout le bloc progression+log. */
  .stale { opacity: .5; filter: grayscale(.4); }

  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .pill.running { background: #1f6feb33; color: #58a6ff; }
  .pill.done { background: #23863633; color: #3fb950; }
  .pill.waiting { background: #6e768166; color: #8b949e; }
  .foot { color: #6e7681; font-size: 12px; margin-top: 8px; text-align: center; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #f85149; color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 600; display: none; z-index: 99;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🤖 Bot Sphinx — Suivi en direct <span id="pill" class="pill waiting">en attente…</span></h1>
  <div class="sub" id="url">En attente du démarrage du bot…</div>

  <!-- Panneau de contrôle -->
  <div class="card">
    <div class="controls">
      <div class="ctrl-group">
        <label>Nombre de réponses</label>
        <div class="counter">
          <button id="btn-minus" onclick="changeTotal(-10)">−</button>
          <input id="inp-total" type="number" min="1" max="9999" value="150">
          <button id="btn-plus" onclick="changeTotal(+10)">+</button>
        </div>
      </div>

      <div class="ctrl-group">
        <label>Mode navigateur</label>
        <div class="toggle-wrap">
          <label class="toggle">
            <input type="checkbox" id="chk-visible" checked>
            <span class="slider"></span>
          </label>
          <span class="toggle-label" id="lbl-visible">Visible</span>
        </div>
      </div>

      <div class="ctrl-group">
        <label>Vitesse</label>
        <div class="speed-row">
          <input type="range" id="rng-speed" min="0.5" max="8" step="0.5" value="1">
          <span class="speed-val" id="speed-val">×1</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn-launch" id="btn-launch" onclick="launch()">▶ Lancer</button>
        <button class="btn-stop" id="btn-stop" onclick="stopBot()" disabled>■ Arrêter</button>
      </div>
    </div>

    <div class="warn" id="warn"></div>
  </div>

  <!-- Progression -->
  <div class="card" id="card-progress">
    <div class="barwrap"><div class="bar" id="bar"></div><div class="barlabel" id="barlabel">0 %</div></div>
    <div class="stats">
      <div class="stat"><div class="n" id="done">0</div><div class="l">Faites</div></div>
      <div class="stat ok"><div class="n" id="ok">0</div><div class="l">Réussies</div></div>
      <div class="stat err"><div class="n" id="errors">0</div><div class="l">Erreurs</div></div>
      <div class="stat"><div class="n" id="eta">—</div><div class="l">Temps restant</div></div>
    </div>
  </div>

  <!-- Log -->
  <div class="card" id="card-log">
    <div class="l" id="log-title" style="color:#8b949e;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">Dernières réponses</div>
    <div class="log" id="log"><div>—</div></div>
  </div>

  <div class="foot" id="foot">Cette page se rafraîchit automatiquement toutes les 2 secondes.</div>
</div>

<div class="toast" id="toast"></div>

<script>
let configPath = "";
let running = false;        // un bot tourne-t-il ?
let suppressSync = false;   // évite de renvoyer /update quand on règle les champs par programme

// Charge la config par défaut depuis le serveur
async function loadDefaults() {
  try {
    const r = await fetch("/bot-config?" + Date.now(), { cache: "no-store" });
    if (!r.ok) return;
    const d = await r.json();
    if (d.default_total) document.getElementById("inp-total").value = d.default_total;
    if (d.config_path) configPath = d.config_path;
    document.getElementById("chk-visible").checked = !d.default_headless;
    updateVisibleLabel();
    if (d.running) setRunning(true);
  } catch (_) {}
}

function changeTotal(delta) {
  const inp = document.getElementById("inp-total");
  const v = Math.max(1, (parseInt(inp.value) || 150) + delta);
  inp.value = v;
  pushUpdate();   // si un run est en cours, applique la nouvelle cible en direct
}

function updateVisibleLabel() {
  const v = document.getElementById("chk-visible").checked;
  document.getElementById("lbl-visible").textContent = v ? "Visible" : "Invisible";
}

function updateSpeedLabel() {
  const s = parseFloat(document.getElementById("rng-speed").value);
  const el = document.getElementById("speed-val");
  el.textContent = "×" + s;
  el.className = "speed-val" + (s >= 5 ? " danger" : s >= 2.5 ? " turbo" : "");
  refreshWarn();
}

document.getElementById("chk-visible").addEventListener("change", () => {
  updateVisibleLabel(); pushUpdate();
});
document.getElementById("rng-speed").addEventListener("input", updateSpeedLabel);
document.getElementById("rng-speed").addEventListener("change", pushUpdate);
// 'input' = à chaque frappe clavier (debouncé), pas seulement au blur, sinon
// taper « 205 » dans le champ ne mettait jamais le total à jour côté bot.
document.getElementById("inp-total").addEventListener("input", pushUpdate);
document.getElementById("inp-total").addEventListener("change", pushUpdate);

// Bascule l'UI entre « prêt à lancer » et « en cours ». Les contrôles restent
// ACTIFS pendant le run (nombre / visible / vitesse modifiables en direct) ;
// seul le bouton Lancer est désactivé et Arrêter est activé.
function setRunning(on) {
  running = on;
  document.getElementById("btn-launch").disabled = on;
  const stop = document.getElementById("btn-stop");
  stop.disabled = !on;
  stop.textContent = "■ Arrêter";  // réinitialise le libellé (après un « Arrêt… »)
}

// Pousse les réglages courants vers le bot SI un run est en cours.
let pushTimer = null;
function pushUpdate() {
  if (!running || suppressSync) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(async () => {
    const total = parseInt(document.getElementById("inp-total").value) || 1;
    const headless = !document.getElementById("chk-visible").checked;
    const speed = parseFloat(document.getElementById("rng-speed").value) || 1;
    try {
      await fetch("/update", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ total, headless, speed }),
      });
    } catch (_) {}
  }, 250);
}

async function stopBot() {
  if (!confirm("Arrêter le bot ? Il finira la réponse EN COURS (ça peut prendre ~30 s) puis s'arrêtera.")) return;
  const btn = document.getElementById("btn-stop");
  btn.disabled = true;
  btn.textContent = "■ Arrêt…";
  try {
    const r = await fetch("/stop", { method: "POST" });
    let d = {};
    try { d = await r.json(); } catch (_) {}
    if (r.ok && d.ok) {
      showToast("Arrêt demandé — fin de la réponse en cours…", "#d29922");
    } else {
      // 409 = plus aucun bot en cours côté serveur : on resynchronise l'UI.
      showToast(d.error || "Aucun bot à arrêter", "#d29922");
      setRunning(false);
      btn.textContent = "■ Arrêter";
    }
  } catch (e) {
    showToast("Impossible de contacter le serveur : " + e.message);
    btn.disabled = false;
    btn.textContent = "■ Arrêter";
  }
}

// Avertissement santé Sphinx : turbo seul = prudence ; turbo + erreurs en rafale
// = on tape trop fort, le serveur « crame ». Mis à jour par updateSpeedLabel() et tick().
let lastErrRate = 0;
function refreshWarn() {
  const s = parseFloat(document.getElementById("rng-speed").value);
  const w = document.getElementById("warn");
  if (lastErrRate >= 40 && s > 1.5) {
    w.className = "warn danger show";
    w.innerHTML = "🔥 <b>Sphinx sature</b> — " + lastErrRate +
      " % d'erreurs récentes à ×" + s +
      ". Réduis la vitesse : le serveur n'encaisse pas le rythme.";
  } else if (s >= 5) {
    w.className = "warn danger show";
    w.innerHTML = "⚠️ <b>Vitesse extrême (×" + s + ")</b> — risque de timeouts et de " +
      "charge anormale sur Sphinx. À réserver à tes propres formulaires de test.";
  } else if (s >= 2.5) {
    w.className = "warn show";
    w.innerHTML = "⚡ <b>Mode turbo (×" + s + ")</b> — délais réduits. Surveille le taux " +
      "d'erreurs ; si ça grimpe, ralentis.";
  } else {
    w.className = "warn";
  }
}

function showToast(msg, color) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = color || "#f85149";
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 3000);
}

async function launch() {
  const total = parseInt(document.getElementById("inp-total").value) || 150;
  const visible = document.getElementById("chk-visible").checked;
  const speed = parseFloat(document.getElementById("rng-speed").value) || 1;
  try {
    const r = await fetch("/launch", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ total, headless: !visible, speed, config_path: configPath }),
    });
    const d = await r.json();
    if (d.ok) {
      setRunning(true);
      showToast("Bot lancé — " + total + " réponses" + (visible ? " (visible)" : " (invisible)"), "#238636");
    } else {
      showToast(d.error || "Erreur");
    }
  } catch (e) {
    showToast("Impossible de contacter le serveur : " + e.message);
  }
}

function fmt(sec) {
  if (sec === null || sec === undefined) return "—";
  if (sec < 60) return sec + " s";
  const m = Math.floor(sec / 60), s = sec % 60;
  return m + " min " + (s < 10 ? "0" : "") + s + " s";
}

async function tick() {
  // Autorité sur « un bot tourne-t-il ? » = le SERVEUR, pas progress.json (qui
  // peut être un vieux fichier d'un run mort). C'est ce qui pilote Lancer/Arrêter
  // et le grisage « obsolète ».
  let serverRunning = running;
  try {
    const rc = await fetch("/bot-config?" + Date.now(), { cache: "no-store" });
    if (rc.ok) serverRunning = (await rc.json()).running;
  } catch (_) {}

  try {
    const res = await fetch("progress.json?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error("no file");
    const d = await res.json();

    const pill = document.getElementById("pill");
    const stale = !serverRunning;          // données figées : plus de bot actif
    setRunning(serverRunning);             // Lancer réactivé / Arrêter grisé dès que le bot s'arrête
    document.getElementById("card-progress").classList.toggle("stale", stale);
    document.getElementById("card-log").classList.toggle("stale", stale);

    if (stale) {
      const stopped = d.status === "stopped";
      pill.className = "pill done"; pill.textContent = stopped ? "arrêté ■" : "terminé ✓";
      document.getElementById("bar").classList.add("done");
      document.getElementById("log-title").textContent =
        "Dernier run (" + (stopped ? "arrêté" : "terminé") + ") — historique figé";
    } else {
      pill.className = "pill running"; pill.textContent = "en cours…";
      document.getElementById("bar").classList.remove("done");
      document.getElementById("log-title").textContent = "Dernières réponses";
      // Reflète la vitesse réelle côté bot dans le curseur, sans déclencher /update.
      suppressSync = true;
      if (typeof d.speed === "number") {
        document.getElementById("rng-speed").value = d.speed;
        updateSpeedLabel();
      }
      suppressSync = false;
    }

    // Santé Sphinx : alimente l'avertissement avec le taux d'erreur récent.
    lastErrRate = d.recent_error_rate || 0;
    refreshWarn();

    document.getElementById("url").textContent =
      "Questionnaire : " + (d.url || "") + "  ·  config : " + (d.config || "");
    document.getElementById("bar").style.width = (d.percent || 0) + "%";
    document.getElementById("barlabel").textContent =
      (d.percent || 0) + " %  (" + (d.done || 0) + " / " + (d.total || 0) + ")";
    document.getElementById("done").textContent = d.done || 0;
    document.getElementById("ok").textContent = d.success || 0;
    document.getElementById("errors").textContent = d.errors || 0;
    document.getElementById("eta").textContent = stale ? "✓" : fmt(d.eta_sec);

    const log = document.getElementById("log");
    log.innerHTML = "";
    (d.recent || []).slice().reverse().forEach(line => {
      const div = document.createElement("div");
      let cls = "";
      if (line.includes("OK")) cls = "OK";
      else if (line.includes("TIMEOUT")) cls = "TIMEOUT";
      else if (line.includes("ERREUR")) cls = "ERREUR";
      div.className = cls; div.textContent = line;
      log.appendChild(div);
    });

    const tail = !serverRunning
      ? (d.status === "stopped" ? "  ·  ARRÊTÉ" : "  ·  TERMINÉ")
      : "  ·  rafraîchissement auto toutes les 2 s";
    document.getElementById("foot").textContent =
      "Dernière mise à jour : " + (d.updated_at || "—") +
      "  ·  écoulé : " + fmt(d.elapsed_sec) + tail;
  } catch (e) {
    // Pas (encore) de progress.json : on se fie à l'état serveur pour Lancer/Arrêter.
    setRunning(serverRunning);
    document.getElementById("foot").textContent =
      "En attente de progress.json… (le bot n'a pas encore démarré)";
  }
}

loadDefaults();
updateSpeedLabel();
tick();
setInterval(tick, 2000);
</script>
</body>
</html>
